name: expense_tracker_mobile
description: Finance Tracker - Mobile App (Flutter)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^13.2.0

  # Internationalisation / formatting
  intl: ^0.19.0

  # UI extras
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
